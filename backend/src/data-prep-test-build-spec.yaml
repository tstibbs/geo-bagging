version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22.19
  pre_build:
    commands:
      - node --version
      - npm --version
      - npm install -g pnpm@11
      - pnpm --version
      - git clone --single-branch --branch=main --depth=1 https://github.com/tstibbs/geo-bagging.git
      - cd geo-bagging/shared
      - git rev-parse HEAD
      - pnpm ci
      - cd -
      - cd geo-bagging/data-prep
      - pnpm ci
      - cd -
  build:
    commands:
      - cd geo-bagging/data-prep
      - pnpm run test-source-download
